services:
  - type: web
    name: kirana-backend
    runtime: docker
    repo: https://github.com/YOUR_USERNAME/kirana-manager
    branch: main
    dockerfilePath: ./backend-node/Dockerfile
    dockerContext: ./backend-node
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kirana-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PORT
        value: 10000
      - key: LANDING_URL
        value: https://YOUR_LANDING_PAGE.onrender.com
      - key: FRONTEND_URL
        value: https://YOUR_FRONTEND.onrender.com
      - key: APP_URL
        value: https://YOUR_FRONTEND.onrender.com
      - key: BACKEND_URL
        value: https://YOUR_BACKEND.onrender.com

databases:
  - name: kirana-db
    databaseName: kirana
    plan: free
