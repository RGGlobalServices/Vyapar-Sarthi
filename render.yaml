services:
  # ── Main App: Next.js app + API (Route Handlers under /api/v1) ──
  - type: web
    name: vyapar-sarthi-api
    runtime: node
    repo: https://github.com/RGGlobalServices/Vyapar-Sarthi
    branch: main
    buildCommand: cd app && npm install && npm run build
    startCommand: cd app && npm start
    healthCheckPath: /api/v1/auth/ping
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vyapar-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: FRONTEND_URL
        value: https://vyapar-sarthi-api.onrender.com
      - key: APP_URL
        value: https://vyapar-sarthi-api.onrender.com
      - key: LANDING_URL
        value: https://vyapar-sarthi-landing.onrender.com
      # Same-origin API — the app serves /api/v1 itself
      - key: NEXT_PUBLIC_API_URL
        value: /api/v1
      - key: NEXT_PUBLIC_FRONTEND_URL
        value: https://vyapar-sarthi-api.onrender.com
      - key: NEXT_PUBLIC_LANDING_URL
        value: https://vyapar-sarthi-landing.onrender.com

  # ── Landing Page (Static Site) ──
  - type: web
    name: vyapar-sarthi-landing
    runtime: static
    repo: https://github.com/RGGlobalServices/Vyapar-Sarthi
    branch: main
    buildCommand: cd landing-page && npm install && npm run build
    staticPublishPath: landing-page/out
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://vyapar-sarthi-api.onrender.com/api/v1
      - key: NEXT_PUBLIC_FRONTEND_URL
        value: https://vyapar-sarthi-api.onrender.com
      - key: NEXT_PUBLIC_LANDING_URL
        value: https://vyapar-sarthi-landing.onrender.com

databases:
  - name: vyapar-db
    databaseName: vyapar
    plan: free
